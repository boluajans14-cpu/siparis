<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ata Mutfak - Sipariş Paneli</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <style>
        :root { --p-color: #d35400; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 15px; margin: 0; }
        .container { max-width: 500px; background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin: auto; }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .person-card { border: 1px solid #eee; padding: 15px; border-radius: 15px; margin-bottom: 20px; background: #fafafa; }
        label { display: block; font-weight: bold; margin-top: 10px; font-size: 13px; color: #555; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 15px; }
        .btn { width: 100%; background: #25D366; color: #fff; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; }
        #loading { text-align: center; color: var(--p-color); padding: 40px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="color:var(--p-color); margin:0;">ATA MUTFAK</h2>
        <p style="margin:5px 0; color:#888;">Sipariş Paneli</p>
    </div>

    <div id="loading">Menü Verileri Ayıklanıyor...</div>

    <form id="mainForm" style="display:none;">
        <label>Ad Soyad *</label>
        <input type="text" id="custName" required>
        
        <label>Teslimat Adresi *</label>
        <textarea id="custAddress" rows="2" required></textarea>

        <label>Kişi Sayısı *</label>
        <select id="personCount" onchange="generateForms()">
            <option value="1">1 Kişilik</option>
            <option value="2">2 Kişilik</option>
            <option value="3">3 Kişilik</option>
        </select>

        <div id="dynamicPersons"></div>

        <button type="button" class="btn" onclick="sendOrder()">WHATSAPP'A GÖNDER</button>
    </form>
</div>

<script>
    const SHEET_ID = '1Tym9AWjTN-2WT4POrdRb2TWyCSZq1kTB2rPcUy_NF_o';
    const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

    let menu = { corba: [], ana: [], yan: [], ek: [] };

    async function getMenu() {
        try {
            const resp = await fetch(URL);
            const text = await resp.text();
            
            // Satırları parçala
            const lines = text.split(/\r?\n/);

            lines.forEach((line, index) => {
                if (index === 0 || !line.trim()) return; // Başlık satırını ve boşları geç

                // CSV Parçalama: Virgül, Noktalı Virgül veya Tab karakterini destekler
                // Tırnak içindeki verileri bozmaz.
                const cols = line.match(/(".*?"|[^",; \t]+)/g) || [];
                
                const clean = (val) => val ? val.replace(/^"|"$/g, '').trim() : "";

                if (clean(cols[0])) menu.corba.push(clean(cols[0]));
                if (clean(cols[1])) menu.ana.push(clean(cols[1]));
                if (clean(cols[2])) menu.yan.push(clean(cols[2]));
                if (clean(cols[3])) menu.ek.push(clean(cols[3]));
            });

            // Eğer hala boşsa, çok daha kaba bir parçalama dene
            if (menu.corba.length === 0 && menu.ana.length === 0) {
                console.log("Standart ayıklama başarısız, kaba yönteme geçiliyor...");
                lines.forEach((line, index) => {
                    if (index === 0) return;
                    let parts = line.split(/[;,]/);
                    if (parts[0]) menu.corba.push(parts[0].trim());
                    if (parts[1]) menu.ana.push(parts[1].trim());
                    if (parts[2]) menu.yan.push(parts[2].trim());
                    if (parts[3]) menu.ek.push(parts[3].trim());
                });
            }

            if (menu.corba.length > 0 || menu.ana.length > 0) {
                $("#loading").hide();
                $("#mainForm").show();
                generateForms();
            } else {
                $("#loading").html("<span style='color:red;'>Tablo içeriği okunamadı.<br>Lütfen E-Tablo'da verileri kontrol edin.</span>");
            }
        } catch (err) {
            $("#loading").html("<span style='color:red;'>Bağlantı Hatası!</span>");
        }
    }

    function generateForms() {
        const count = $("#personCount").val();
        const container = $("#dynamicPersons");
        container.empty();
        for(let i = 1; i <= count; i++) {
            container.append(`
                <div class="person-card">
                    <strong style="color:var(--p-color)">${i}. Kişi</strong>
                    <label>Çorba</label><select class="p-corba">${menu.corba.map(x=>`<option>${x}</option>`).join('')}</select>
                    <label>Ana Yemek</label><select class="p-ana">${menu.ana.map(x=>`<option>${x}</option>`).join('')}</select>
                    <label>Yan Lezzet</label><select class="p-yan">${menu.yan.map(x=>`<option>${x}</option>`).join('')}</select>
                    <label>İçecek</label><select class="p-ek">${menu.ek.map(x=>`<option>${x}</option>`).join('')}</select>
                </div>`);
        }
    }

    function sendOrder() {
        const name = $("#custName").val();
        const addr = $("#custAddress").val();
        if(!name || !addr) return alert("Lütfen eksikleri doldurun.");
        let msg = `*YENİ SİPARİŞ*\n👤 *Müşteri:* ${name}\n📍 *Adres:* ${addr}\n----------\n`;
        $(".person-card").each(function(i) {
            msg += `*${i+1}. Kişi:* ${$(this).find(".p-corba").val()}, ${$(this).find(".p-ana").val()}, ${$(this).find(".p-yan").val()}, ${$(this).find(".p-ek").val()}\n`;
        });
        window.location.href = "https://wa.me/905077476114?text=" + encodeURIComponent(msg);
    }
    $(document).ready(() => getMenu());
</script>
</body>
</html>
