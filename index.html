<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ata Mutfak - Sipariş</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <style>
        :root { --p-color: #d35400; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; padding: 15px; }
        .container { max-width: 500px; background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); margin: auto; }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 25px; padding-bottom: 15px; }
        .person-card { border: 1px solid #eee; padding: 20px; border-radius: 15px; margin-bottom: 20px; background: #fafafa; position: relative; }
        .person-label { position: absolute; top: -10px; left: 15px; background: var(--p-color); color: white; padding: 2px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #555; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 15px; }
        .btn { width: 100%; background: #25D366; color: #fff; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        #loading { text-align: center; color: var(--p-color); padding: 30px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="color:var(--p-color); margin:0;">ATA MUTFAK</h2>
        <p style="margin:5px 0; color:#888;">Hızlı Sipariş Sistemi</p>
    </div>

    <div id="loading">Menü E-Tablo'dan okunuyor...</div>

    <form id="mainForm" style="display:none;">
        <div class="input-group"><label>Ad Soyad *</label><input type="text" id="custName" required placeholder="İsminiz"></div>
        <div class="input-group"><label>Teslimat Adresi *</label><textarea id="custAddress" rows="2" required placeholder="Adresiniz"></textarea></div>
        <div class="input-group">
            <label>Kişi Sayısı *</label>
            <select id="personCount" onchange="generateForms()">
                <option value="1">1 Kişilik</option><option value="2">2 Kişilik</option><option value="3">3 Kişilik</option>
            </select>
        </div>
        <div id="dynamicPersons"></div>
        <button type="button" class="btn" onclick="sendOrder()">SİPARİŞİ WHATSAPP'A GÖNDER</button>
    </form>
</div>

<script>
    const SHEET_ID = '1Tym9AWjTN-2WT4POrdRb2TWyCSZq1kTB2rPcUy_NF_o';
    const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

    let menu = { corba: [], ana: [], yan: [], ek: [] };

    async function getMenu() {
        try {
            const resp = await fetch(URL);
            const text = await resp.text();
            
            const rows = text.split(/\r?\n/).filter(row => row.trim() !== "");

            rows.slice(1).forEach(row => {
                // Hem virgül hem noktalı virgül ile ayır, boşlukları temizle
                let cols = row.split(/[;,]/).map(c => c.replace(/^"|"$/g, '').trim());

                if (cols[0]) menu.corba.push(cols[0]);
                if (cols[1]) menu.ana.push(cols[1]);
                if (cols[2]) menu.yan.push(cols[2]);
                if (cols[3]) menu.ek.push(cols[3]);
            });

            if(menu.corba.length > 0) {
                $("#loading").hide();
                $("#mainForm").show();
                generateForms();
            } else {
                $("#loading").html("<span style='color:red;'>Tablo bağlandı ama veri ayrıştırılamadı.</span>");
            }
        } catch (err) {
            $("#loading").text("Bağlantı Hatası!");
        }
    }

    function generateForms() {
        const count = $("#personCount").val();
        const container = $("#dynamicPersons");
        container.empty();
        for(let i = 1; i <= count; i++) {
            container.append(`
                <div class="person-card">
                    <span class="person-label">${i}. KİŞİ</span>
                    <div class="input-group"><label>Çorba</label><select class="p-corba">${menu.corba.map(x => `<option>${x}</option>`).join('')}</select></div>
                    <div class="input-group"><label>Ana Yemek</label><select class="p-ana">${menu.ana.map(x => `<option>${x}</option>`).join('')}</select></div>
                    <div class="input-group"><label>Yan Lezzet</label><select class="p-yan">${menu.yan.map(x => `<option>${x}</option>`).join('')}</select></div>
                    <div class="input-group"><label>İçecek</label><select class="p-ek">${menu.ek.map(x => `<option>${x}</option>`).join('')}</select></div>
                </div>`);
        }
    }

    function sendOrder() {
        const name = $("#custName").val();
        const addr = $("#custAddress").val();
        if(!name || !addr) { alert("Lütfen alanları doldurun!"); return; }
        let msg = `*YENİ SİPARİŞ*\n👤 *Müşteri:* ${name}\n📍 *Adres:* ${addr}\n----------\n`;
        $(".person-card").each(function(i) {
            msg += `*${i+1}. Kişi:* ${$(this).find(".p-corba").val()}, ${$(this).find(".p-ana").val()}, ${$(this).find(".p-yan").val()}, ${$(this).find(".p-ek").val()}\n`;
        });
        window.location.href = "https://wa.me/905077476114?text=" + encodeURIComponent(msg);
    }
    $(document).ready(() => getMenu());
</script>
</body>
</html>
